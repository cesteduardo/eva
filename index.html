<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Feliz Aniversário, Vó!</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23241710'/%3E%3Ctext x='32' y='44' font-size='36' text-anchor='middle'%3E%F0%9F%8E%82%3C/text%3E%3C/svg%3E">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;overflow:hidden;}
  body{
    font-family:'Georgia',serif;
    background:radial-gradient(circle at 20% 15%, #f7ecdf 0%, #ede4da 40%, #e3d4c2 100%);
    display:flex;align-items:center;justify-content:center;
    position:relative;
    overflow:hidden;
  }
  canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0;}
  .deco{
    position:absolute;
    font-size:1.6em;
    opacity:0.55;
    animation:floaty 6s ease-in-out infinite;
    z-index:0;
    filter:drop-shadow(0 4px 8px rgba(0,0,0,0.08));
  }
  @keyframes floaty{
    0%,100%{transform:translateY(0) rotate(-4deg);}
    50%{transform:translateY(-16px) rotate(4deg);}
  }
  .d1{top:6%;left:7%;animation-delay:0s;}
  .d2{top:10%;right:8%;animation-delay:1s;}
  .d3{bottom:8%;left:10%;animation-delay:1.6s;}
  .d4{bottom:12%;right:6%;animation-delay:.6s;}
  .d5{top:42%;left:3%;animation-delay:2.2s;font-size:1.2em;}
  .d6{top:48%;right:3%;animation-delay:1.3s;font-size:1.2em;}
  .card{
    background:#241710;
    border-radius:28px;
    width:94%;
    max-width:1100px;
    height:90vh;
    max-height:620px;
    display:flex;
    overflow:hidden;
    box-shadow:0 25px 70px rgba(0,0,0,0.35);
    position:relative;
    z-index:2;
  }
  .text-side{
    flex:1.1;
    padding:60px 56px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    position:relative;
  }
  .quote-block{
    border-left:2px solid #c9876a;
    padding-left:22px;
    margin-bottom:34px;
  }
  .quote-block p{
    color:#f1e9e1;
    font-size:1.55em;
    font-style:italic;
    line-height:1.45;
    margin-bottom:4px;
  }
  .signature{
    color:#9c8d80;
    font-size:0.78em;
    letter-spacing:3px;
    text-transform:uppercase;
    margin-top:14px;
  }
  .love-line{
    display:flex;
    align-items:center;
    gap:10px;
    color:#f1e9e1;
    font-size:1.15em;
    font-style:italic;
  }
  .heart{
    color:#c9876a;
    animation:beat 1.1s infinite;
    display:inline-block;
  }
  @keyframes beat{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.25);}
  }
  .music-note{
    margin-top:26px;
    color:#9c8d80;
    font-size:0.78em;
    letter-spacing:1px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .music-note .icon{
    animation:notebounce 1.2s ease-in-out infinite;
  }
  @keyframes notebounce{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-2px);}
  }

  .photo-side{
    flex:1;
    position:relative;
    overflow:hidden;
  }
  .photo-side img{
    width:100%;height:100%;
    object-fit:cover;
    display:block;
  }
  .photo-side::after{
    content:'';
    position:absolute;inset:0;
    background:linear-gradient(90deg, rgba(36,23,16,0.5) 0%, transparent 18%);
  }

  audio{display:none;}

  .play-btn{
    position:relative;
    z-index:3;
    background:#241710;
    color:#f1e9e1;
    border:1px solid #c9876a;
    border-radius:50px;
    padding:10px 18px;
    margin-top:14px;
    width:max-content;
    max-width:100%;
    font-family:'Georgia',serif;
    font-size:0.85em;
    font-style:italic;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:8px;
    box-shadow:0 8px 20px rgba(0,0,0,0.25);
    transition:transform .2s ease, opacity .3s ease;
  }
  .play-btn:hover{transform:translateY(-2px);}
  .play-btn.hidden{display:none;}

  @media (max-width:760px){
    html,body{
      height:auto;
      min-height:100%;
      overflow-x:hidden;
      overflow-y:auto;
    }
    body{
      display:block;
      padding:0;
      background:#241710;
    }
    canvas{position:fixed;}
    .card{
      width:100%;
      min-height:100vh;
      min-height:100svh;
      height:auto;
      max-height:none;
      flex-direction:column;
      border-radius:0;
      box-shadow:none;
      overflow:visible;
    }
    .text-side{
      order:2;
      flex:none;
      min-height:48svh;
      padding:28px 24px calc(30px + env(safe-area-inset-bottom));
      justify-content:flex-start;
      background:#241710;
    }
    .photo-side{
      order:1;
      flex:none;
      width:100%;
      height:52vh;
      height:52svh;
      min-height:290px;
      max-height:520px;
    }
    .photo-side img{object-position:center 28%;}
    .photo-side::after{
      background:linear-gradient(180deg, transparent 58%, rgba(36,23,16,.25) 76%, #241710 100%);
    }
    .quote-block{
      margin:-8px 0 20px;
      padding-left:16px;
    }
    .quote-block p{
      font-size:clamp(1.08rem,5.2vw,1.38rem);
      line-height:1.38;
      text-wrap:balance;
    }
    .signature{margin-top:12px;font-size:.68rem;letter-spacing:2.2px;}
    .love-line{font-size:1.05rem;}
    .music-note{
      margin-top:18px;
      font-size:.78rem;
      line-height:1.5;
      letter-spacing:.35px;
      align-items:flex-start;
      max-width:330px;
    }
    .music-note .icon{margin-top:1px;}
    .play-btn{
      min-height:46px;
      margin-top:14px;
      padding:11px 20px;
      font-size:.88rem;
      background:#c9876a;
      color:#241710;
      border-color:#dba086;
      box-shadow:0 10px 24px rgba(0,0,0,.3);
    }
    .deco{position:fixed;font-size:1.15em;opacity:.38;}
  }

  @media (max-width:380px){
    .photo-side{height:47svh;min-height:250px;}
    .text-side{min-height:53svh;padding:24px 20px calc(26px + env(safe-area-inset-bottom));}
    .quote-block{margin-top:-4px;margin-bottom:16px;}
    .quote-block p{font-size:1.05rem;}
    .music-note{margin-top:15px;font-size:.74rem;}
    .play-btn{width:100%;justify-content:center;}
  }

  @media (max-height:650px) and (max-width:760px){
    .photo-side{height:44svh;min-height:220px;}
    .text-side{min-height:56svh;padding-top:20px;}
    .quote-block{margin-bottom:12px;}
    .quote-block p{font-size:1rem;line-height:1.3;}
    .signature{margin-top:8px;}
    .music-note{margin-top:12px;}
    .play-btn{margin-top:10px;}
  }
</style>
</head>

  <div class="card">

        <p>"Feliz aniversário, vó.</p>

        <div class="signature">Com todo carinho</div>
      </div>
      <div class="love-line">Te amo <span class="heart">❤</span></div>

  <audio id="bgmusic" src="musica.mp3" autoplay loop preload="auto" playsinline></audio>
<script>
const canvas = document.getElementById('confetti');
const ctx = canvas.getContext('2d');
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
resize();
window.addEventListener('resize',resize);
const colors = ['#c9876a','#e8c39e','#9c8d80','#d9a679','#f1e9e1'];
const pieces = [];
for(let i=0;i<70;i++){
  pieces.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height - canvas.height,
    w: 5+Math.random()*5,
    h: 7+Math.random()*8,
    color: colors[Math.floor(Math.random()*colors.length)],
    speed: 0.6+Math.random()*1.4,
    drift: Math.random()*1.4-0.7,
    rot: Math.random()*360,
    rotSpeed: (Math.random()*3-1.5)
  });
}
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(const p of pieces){
    ctx.save();
    ctx.translate(p.x,p.y);
    ctx.rotate(p.rot*Math.PI/180);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = 0.5;
    ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
    ctx.restore();
    p.y += p.speed;
    p.x += p.drift;
    p.rot += p.rotSpeed;
    if(p.y > canvas.height){p.y=-10;p.x=Math.random()*canvas.width;}
  }
  requestAnimationFrame(draw);
}
draw();

const audio = document.getElementById('bgmusic');
const playBtn = document.getElementById('playBtn');
audio.volume = 1;

function startMusic(){
  audio.play().then(() => {
    playBtn.classList.add('hidden');
  }).catch(() => {
    // autoplay bloqueado, mantém o botão visível
  });
}

// Tenta iniciar imediatamente e novamente assim que a página terminar de abrir.
startMusic();
window.addEventListener('DOMContentLoaded', startMusic);
window.addEventListener('load', startMusic);

// botão sempre garante o play
playBtn.addEventListener('click', startMusic);

// qualquer clique na página também tenta iniciar, caso o autoplay tenha sido bloqueado
document.body.addEventListener('click', () => {
  if(audio.paused){ startMusic(); }
});

// Navegadores que bloqueiam áudio automático liberam a reprodução
// na primeira interação do visitante.
['pointerdown', 'touchstart', 'keydown'].forEach(eventName => {
  document.addEventListener(eventName, () => {
    if(audio.paused){ startMusic(); }
  }, { once:true, passive:true });
});
</script>
